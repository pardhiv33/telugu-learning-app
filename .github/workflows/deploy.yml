name: Deploy Website to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.TELUGU_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TELUGU_SECRET_KEY }}
          aws-region: ap-south-1

      - name: Upload files to S3
        run: aws s3 sync . s3://telugu-learning-app  --delete